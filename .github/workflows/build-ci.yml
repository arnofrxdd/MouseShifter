name: MouseShifter CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*", "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      
    - name: Restore NuGet Packages
      run: nuget restore MouseShifter.sln

    - name: Get Version from Updater.cpp
      id: get_version
      shell: powershell
      run: |
        $content = (Get-Content "MouseShifter/Core/System/Updater.cpp") -join "`n"
        if ($content -match 'currentVersion\s*=\s*\"([0-9.]+)\"') {
          $version = $matches[1]
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Found version: $version"
        } else {
          echo "Could not find version in Updater.cpp"
          exit 1
        }

    - name: Build MouseShifter (x64 Release)
      run: msbuild MouseShifter.sln /p:Configuration=Release /p:Platform=x64

    - name: Prepare Release Bundle
      shell: powershell
      run: |
        # Ensure the Release folder has all dependencies
        Copy-Item "MouseShifter/SDL2 LIBS/lib/x64/SDL2.dll" -Destination "x64/Release/" -Force
        Copy-Item "MouseShifter/RawMouseInput.dll" -Destination "x64/Release/" -Force
        Copy-Item "MouseShifter/xInputBlocker.dll" -Destination "x64/Release/" -Force

    - name: Determine Type and Filename
      id: info
      shell: powershell
      run: |
        if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
          echo "TYPE=stable" >> $env:GITHUB_OUTPUT
          echo "TAG=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          echo "ZIP=MouseShifter_v${{ steps.get_version.outputs.VERSION }}.zip" >> $env:GITHUB_OUTPUT
          echo "PRERELEASE=false" >> $env:GITHUB_OUTPUT
        } else {
          echo "TYPE=nightly" >> $env:GITHUB_OUTPUT
          echo "TAG=nightly" >> $env:GITHUB_OUTPUT
          echo "ZIP=MouseShifter_Nightly.zip" >> $env:GITHUB_OUTPUT
          echo "PRERELEASE=true" >> $env:GITHUB_OUTPUT
        }

    - name: Zip Build Output
      shell: powershell
      run: |
        Compress-Archive -Path "x64\Release\*" -DestinationPath "${{ steps.info.outputs.ZIP }}"

    - name: Upload Build Artifact (CI)
      uses: actions/upload-artifact@v4
      with:
        name: MouseShifter-${{ steps.info.outputs.TYPE }}
        path: ${{ steps.info.outputs.ZIP }}

    - name: Generate Security Hash & Scan Link
      id: security
      shell: powershell
      run: |
        $hash = (Get-FileHash -Path "${{ steps.info.outputs.ZIP }}" -Algorithm SHA256).Hash
        echo "SHA256=$hash" >> $env:GITHUB_OUTPUT
        echo "VT_LINK=https://www.virustotal.com/gui/file/$hash/detection" >> $env:GITHUB_OUTPUT
        
        if ("${{ secrets.VIRUSTOTAL_API_KEY }}") {
          Write-Host "Triggering VirusTotal scan (curl)..."
          try {
            # Use curl.exe (actual binary) to bypass PowerShell's 'curl' alias for Invoke-WebRequest
            $responseJson = curl.exe --silent -X POST "https://www.virustotal.com/api/v3/files" `
              -H "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" `
              -F "file=@${{ steps.info.outputs.ZIP }}"
            
            $response = $responseJson | ConvertFrom-Json
            Write-Host "VirusTotal analysis started! ID: $($response.data.id)"
          } catch {
             Write-Host "VT Scan Trigger failed. Error: $($_.Exception.Message)"
          }
        }

    - name: Create / Update GitHub Release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.info.outputs.TAG }}
        files: ${{ steps.info.outputs.ZIP }}
        name: "MouseShifter ${{ steps.info.outputs.TYPE == 'stable' && steps.info.outputs.TAG || 'Nightly Beta' }}"
        body: |
          ### ${{ steps.info.outputs.TYPE == 'stable' && 'Stable Release' || 'Nightly Development Build' }}
          ${{ steps.info.outputs.TYPE == 'stable' && 'Official release version.' || 'This is an experimental pre-release. Use with caution!' }}
          
          ---
          **Version**: ${{ steps.get_version.outputs.VERSION }}
          **Build Time**: ${{ github.event.head_commit.timestamp || 'Manual/Scheduled' }}
          
          🛡️ **Security Verification**
          - **SHA256**: `${{ steps.security.outputs.SHA256 }}`
          - [**VirusTotal Scan Report**](${{ steps.security.outputs.VT_LINK }})
          
          *Note: If the VirusTotal link is new, click "Reanalyze" on their site to see the fresh results for this exact build.*
        prerelease: ${{ steps.info.outputs.PRERELEASE }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
