name: MouseShifter CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*", "v*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      
    - name: Restore NuGet Packages
      run: nuget restore MouseShifter.sln

    - name: Get Version from Updater.cpp
      id: get_version
      shell: powershell
      run: |
        $content = Get-Content "MouseShifter/Core/System/Updater.cpp"
        if ($content -match 'currentVersion = \"([0-9.]+)\"') {
          $version = $matches[1]
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Found version: $version"
        } else {
          echo "Could not find version in Updater.cpp"
          exit 1
        }

    - name: Build MouseShifter (x64 Release)
      run: msbuild MouseShifter.sln /p:Configuration=Release /p:Platform=x64

    - name: Zip Build Output
      shell: powershell
      run: |
        Compress-Archive -Path "x64\Release\*" -DestinationPath "MouseShifter_Release.zip"

    - name: Upload Build Artifact (CI)
      uses: actions/upload-artifact@v4
      with:
        name: MouseShifter-Full-Bundle
        path: MouseShifter_Release.zip

    - name: Create / Update GitHub Tag & Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        files: MouseShifter_Release.zip
        body: "Automated release of MouseShifter version v${{ steps.get_version.outputs.VERSION }}"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
