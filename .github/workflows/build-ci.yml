name: MouseShifter CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*", "v*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      
    - name: Restore NuGet Packages
      run: nuget restore MouseShifter.sln

    - name: Build MouseShifter (x64 Release)
      run: msbuild MouseShifter.sln /p:Configuration=Release /p:Platform=x64

    - name: Zip Build Output
      shell: powershell
      run: |
        Compress-Archive -Path "x64\Release\*" -DestinationPath "MouseShifter_Release.zip"

    - name: Upload Build Artifact (CI)
      uses: actions/upload-artifact@v4
      with:
        name: MouseShifter-Full-Bundle
        path: MouseShifter_Release.zip

    - name: Create GitHub Release (CD)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: MouseShifter_Release.zip
        body: "Automated release of MouseShifter version ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
